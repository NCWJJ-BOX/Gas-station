<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - ปั๊มน้ำมัน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --primary-light: #dcfce7;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 50%, #166534 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            text-align: center;
        }

        .header {
            background: var(--gray-900);
            color: white;
            padding: 32px 32px 24px;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--gray-400);
            font-size: 14px;
        }

        .qr-section {
            padding: 40px 32px;
        }

        .qr-wrapper {
            display: inline-block;
            padding: 16px;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 3px solid var(--gray-100);
        }

        .qr-wrapper img {
            display: block;
            width: 220px;
            height: 220px;
        }

        .url-display {
            margin-top: 24px;
            padding: 14px 20px;
            background: var(--gray-50);
            border-radius: 12px;
            border: 1px solid var(--gray-200);
        }

        .url-display a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            word-break: break-all;
        }

        .url-display a:hover {
            text-decoration: underline;
        }

        .instruction {
            margin-top: 20px;
            color: var(--gray-500);
            font-size: 14px;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .header, .qr-section {
                padding: 24px 20px;
            }

            .qr-wrapper img {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">⛽</div>
            <h1>สแกน QR Code</h1>
            <p>เพื่อเข้าสู่ระบบสั่งเติมน้ำมัน</p>
        </div>

        <div class="qr-section">
            <div class="qr-wrapper">
                <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
            </div>

            <div class="url-display">
                <a href="https://webpoo.ncwjjdx.work/" target="_blank">https://webpoo.ncwjjdx.work/</a>
            </div>

            <p class="instruction">
                สแกน QR Code ด้วยกล้องโทรศัพท์มือถือ<br>
                หรือกดลิงก์ด้านบนเพื่อเปิดเว็บไซต์
            </p>
        </div>

        <div class="footer">
            <a href="/">← กลับไปหน้าสั่งเติมน้ำมัน</a>
        </div>
    </div>
</body>
</html>
