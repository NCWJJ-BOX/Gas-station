<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปั๊มน้ำมัน - Gas Station</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --primary-light: #dcfce7;
            --danger: #dc2626;
            --danger-dark: #b91c1c;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 50%, #166534 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .header {
            background: var(--gray-900);
            color: white;
            padding: 32px 32px 24px;
            text-align: center;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--gray-400);
            font-size: 14px;
        }

        .form-body {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .fuel-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .fuel-option {
            position: relative;
        }

        .fuel-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .fuel-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px;
            background: var(--gray-50);
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .fuel-option label:hover {
            border-color: var(--gray-300);
            background: var(--gray-100);
        }

        .fuel-option input:checked + label {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .fuel-name {
            font-weight: 600;
            color: var(--gray-800);
            font-size: 16px;
        }

        .fuel-price {
            font-size: 13px;
            color: var(--gray-500);
            margin-top: 4px;
        }

        .fuel-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .fuel-option input:checked + label .fuel-badge {
            display: flex;
        }

        .input-group {
            position: relative;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            height: 56px;
            padding: 16px;
            padding-right: 80px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            color: var(--gray-800);
            transition: all 0.2s ease;
            background: var(--gray-50);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .input-suffix {
            position: absolute;
            right: 16px;
            color: var(--gray-500);
            font-weight: 500;
            pointer-events: none;
        }

        .input-suffix.unit {
            right: 60px;
        }

        .input-toggle {
            position: absolute;
            right: 8px;
            background: var(--gray-200);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .input-toggle:hover {
            background: var(--gray-300);
        }

        .summary-card {
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
            margin-bottom: 24px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .summary-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .summary-label {
            color: var(--gray-400);
            font-size: 14px;
        }

        .summary-value {
            font-weight: 600;
            font-size: 16px;
        }

        .summary-total {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .summary-total .summary-value {
            font-size: 28px;
            color: #4ade80;
        }

        .submit-btn {
            width: 100%;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .footer {
            text-align: center;
            padding: 16px;
            background: var(--gray-50);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--gray-900);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--primary-dark);
        }

        .toast.error {
            background: var(--danger-dark);
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .toast.success .toast-icon {
            background: #4ade80;
            color: var(--gray-900);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .fuel-options {
                grid-template-columns: 1fr;
            }

            .header, .form-body {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">⛽</div>
            <h1>สั่งเติมน้ำมัน</h1>
            <p>เลือกประเภทและจำนวน</p>
        </div>

        <form class="form-body" id="fuel-form">
            <div class="form-group">
                <label class="form-label">ประเภทน้ำมัน</label>
                <div class="fuel-options">
                    <div class="fuel-option">
                        <input type="radio" name="fuel_type" id="fuel-91" value="91" data-price="34.88" checked>
                        <label for="fuel-91">
                            <span class="fuel-badge">✓</span>
                            <span class="fuel-name">91</span>
                            <span class="fuel-price">34.88 ฿/L</span>
                        </label>
                    </div>
                    <div class="fuel-option">
                        <input type="radio" name="fuel_type" id="fuel-95" value="95" data-price="35.25">
                        <label for="fuel-95">
                            <span class="fuel-badge">✓</span>
                            <span class="fuel-name">95</span>
                            <span class="fuel-price">35.25 ฿/L</span>
                        </label>
                    </div>
                    <div class="fuel-option">
                        <input type="radio" name="fuel_type" id="fuel-benzene" value="benzene" data-price="43.54">
                        <label for="fuel-benzene">
                            <span class="fuel-badge">✓</span>
                            <span class="fuel-name">เบนซิน</span>
                            <span class="fuel-price">43.54 ฿/L</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">จำนวนลิตร</label>
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="number" class="form-input" id="liters" 
                               placeholder="0.00" min="0" step="0.01" value="0">
                        <span class="input-suffix">ลิตร</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">จำนวนเงิน</label>
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="number" class="form-input" id="amount" 
                               placeholder="0.00" min="0" step="0.01" value="0">
                        <span class="input-suffix">บาท</span>
                    </div>
                </div>
            </div>

            <div class="summary-card">
                <div class="summary-row">
                    <span class="summary-label">ประเภท</span>
                    <span class="summary-value" id="summary-fuel">น้ำมัน 91</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">ราคาต่อลิตร</span>
                    <span class="summary-value" id="summary-price">34.88 ฿</span>
                </div>
                <div class="summary-row summary-total">
                    <span class="summary-label">รวมทั้งสิ้น</span>
                    <span class="summary-value" id="summary-total">0.00 ฿</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span>ยืนยันการสั่งซื้อ</span>
            </button>
        </form>

        <div class="footer">
            <a href="/qr-code">📱 ดู QR Code</a>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">ทำรายการสำเร็จ!</span>
    </div>

    <script>
        const fuelInputs = document.querySelectorAll('input[name="fuel_type"]');
        const litersInput = document.getElementById('liters');
        const amountInput = document.getElementById('amount');
        const summaryFuel = document.getElementById('summary-fuel');
        const summaryPrice = document.getElementById('summary-price');
        const summaryTotal = document.getElementById('summary-total');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('fuel-form');
        const toast = document.getElementById('toast');

        let currentPrice = 34.88;
        let isUpdating = false;

        // Get fuel name from value
        function getFuelName(value) {
            const names = {
                '91': 'น้ำมัน 91',
                '95': 'น้ำมัน 95',
                'benzene': 'เบนซิน'
            };
            return names[value] || value;
        }

        // Update calculations
        function updateCalculations(source) {
            if (isUpdating) return;
            isUpdating = true;

            if (source === 'liters') {
                const liters = parseFloat(litersInput.value) || 0;
                amountInput.value = (liters * currentPrice).toFixed(2);
            } else if (source === 'amount') {
                const amount = parseFloat(amountInput.value) || 0;
                litersInput.value = (amount / currentPrice).toFixed(2);
            }

            // Update summary
            const liters = parseFloat(litersInput.value) || 0;
            const total = (liters * currentPrice).toFixed(2);
            summaryFuel.textContent = getFuelName(document.querySelector('input[name="fuel_type"]:checked').value);
            summaryPrice.textContent = currentPrice.toFixed(2) + ' ฿';
            summaryTotal.textContent = parseFloat(total).toFixed(2) + ' ฿';

            isUpdating = false;
        }

        // Event listeners for fuel type
        fuelInputs.forEach(input => {
            input.addEventListener('change', () => {
                currentPrice = parseFloat(input.dataset.price);
                updateCalculations('liters');
            });
        });

        // Event listeners for inputs
        litersInput.addEventListener('input', () => updateCalculations('liters'));
        amountInput.addEventListener('input', () => updateCalculations('amount'));

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const liters = parseFloat(litersInput.value) || 0;
            const amount = parseFloat(amountInput.value) || 0;
            const selectedFuel = document.querySelector('input[name="fuel_type"]:checked');

            if (liters <= 0 || amount <= 0) {
                showToast('กรุณากรอกจำนวนลิตรหรือเงิน', 'error');
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div> กำลังส่ง...';

            const fuelValue = selectedFuel.value;
            const fuelName = fuelValue === 'benzene' ? 'benzene' : 'gas ' + fuelValue;

            const data = {
                fuel_name: fuelName,
                unit: currentPrice.toString(),
                liters: liters,
                amount: amount
            };

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showToast('ทำรายการสำเร็จ!', 'success');
                    setTimeout(() => {
                        litersInput.value = 0;
                        amountInput.value = 0;
                        updateCalculations('liters');
                    }, 2000);
                } else {
                    showToast('เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('ไม่สามารถเชื่อมต่อได้', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'ยืนยันการสั่งซื้อ';
            }
        });

        // Toast notification
        function showToast(message, type = 'success') {
            const toastMessage = toast.querySelector('.toast-message');
            toastMessage.textContent = message;
            
            toast.className = 'toast ' + type;
            if (type === 'success') {
                toast.querySelector('.toast-icon').textContent = '✓';
            } else {
                toast.querySelector('.toast-icon').textContent = '!';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initial calculation
        updateCalculations('liters');
    </script>
</body>
</html>
